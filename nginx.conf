server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    # Serve the Angular app under /visualizer/
    location /visualizer/ {
        try_files $uri $uri/ /visualizer/index.html;
    }

    # Redirect base path to the app
    location = / {
        return 302 /visualizer/;
    }
}
