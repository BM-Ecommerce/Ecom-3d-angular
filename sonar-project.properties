# SonarCloud Configuration — Ecom-3D-Angular Visualizer
sonar.organization=bm-ecommerce
sonar.projectKey=BM-Ecommerce_Ecom-3d-angular
sonar.projectName=Ecom-3D-Angular Visualizer
sonar.projectVersion=1.0

# Source & Test directories
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.spec.ts

# Exclusions
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/*.spec.ts,\
  **/environments/**,\
  **/assets/**,\
  **/*.css,\
  **/*.scss

# Coverage reports (generated by Karma + Istanbul)
sonar.javascript.lcov.reportPaths=coverage/visualization/lcov.info
sonar.typescript.lcov.reportPaths=coverage/visualization/lcov.info

# TypeScript
sonar.typescript.tsconfigPath=tsconfig.json

# Encoding
sonar.sourceEncoding=UTF-8
