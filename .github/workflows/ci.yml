name: Angular CI Pipeline with AI Analysis

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── Tab 1: Build ───────────────────────────────────────────────
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.build.outputs.status }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache node_modules
        id: cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm install --legacy-peer-deps

      - name: Build
        id: build
        run: |
          npm run build -- --configuration production 2>&1 | tee build-output.txt
          echo "status=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-output
          retention-days: 1
          path: build-output.txt

  # ── Tab 2: Unit Tests ──────────────────────────────────────────
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.test.outputs.status }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache node_modules
        id: cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm install --legacy-peer-deps

      - name: Test
        id: test
        run: |
          npm test -- --watch=false --browsers=ChromeHeadlessCI --code-coverage 2>&1 | tee test-output.txt
          echo "status=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-output
          retention-days: 1
          path: |
            test-output.txt
            coverage/

  # ── Tab 3: Code Quality & AI ───────────────────────────────────
  quality-and-notify:
    name: 🔍 Code Quality & 🤖 AI
    runs-on: ubuntu-latest
    needs: [build, unit-tests]
    if: always()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache node_modules
        id: cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm install --legacy-peer-deps

      - name: Cache ai-pipeline node_modules
        id: cache-ai
        uses: actions/cache@v4
        with:
          path: ai-pipeline/node_modules
          key: ai-node-${{ hashFiles('ai-pipeline/package-lock.json') }}

      - name: Install AI pipeline deps
        if: steps.cache-ai.outputs.cache-hit != 'true'
        run: npm install --legacy-peer-deps
        working-directory: ai-pipeline

      - uses: actions/download-artifact@v4
        with:
          name: build-output
          path: .
        continue-on-error: true

      - uses: actions/download-artifact@v4
        with:
          name: test-output
          path: .
        continue-on-error: true

      - name: 🔍 SonarQube Scan
        if: github.ref == 'refs/heads/main'
        id: sonar
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          npx sonarqube-scanner \
            -Dsonar.login=$SONAR_TOKEN \
            -Dsonar.host.url=$SONAR_HOST_URL \
            2>&1 | tee sonar-output.txt
          echo "status=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: 🤖 AI Analysis & Teams Notify
        if: always()
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BUILD_STATUS: ${{ needs.build.outputs.status }}
          TEST_STATUS: ${{ needs.unit-tests.outputs.status }}
          SONAR_STATUS: ${{ steps.sonar.outputs.status }}
        run: node ai-pipeline/index.js
