name: Angular CI Pipeline with AI Analysis

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

# ─────────────────────────────────────────────────────────────────
# Each job appears as a separate tab in GitHub Actions UI
# ─────────────────────────────────────────────────────────────────

jobs:

  # ── Tab 1: Build ───────────────────────────────────────────────
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.build.outputs.status }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        id: build
        run: |
          npm run build -- --configuration production 2>&1 | tee build-output.txt
          echo "status=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Upload build output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-output
          path: |
            build-output.txt
            dist/

  # ── Tab 2: Unit Tests ──────────────────────────────────────────
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: build
    outputs:
      status: ${{ steps.test.outputs.status }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Karma tests with coverage
        id: test
        run: |
          npm test -- --watch=false --browsers=ChromeHeadlessCI --code-coverage 2>&1 | tee test-output.txt
          echo "status=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-output
          path: |
            test-output.txt
            coverage/

  # ── Tab 3: Code Quality (SonarQube) ───────────────────────────
  code-quality:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest
    needs: unit-tests
    outputs:
      status: ${{ steps.sonar.outputs.status }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: test-output
        continue-on-error: true

      - name: SonarQube scan
        id: sonar
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          npx sonarqube-scanner \
            -Dsonar.login=$SONAR_TOKEN \
            -Dsonar.host.url=$SONAR_HOST_URL \
            2>&1 | tee sonar-output.txt
          echo "status=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Upload sonar output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sonar-output
          path: sonar-output.txt

  # ── Tab 4: AI Analysis + Teams Notification ────────────────────
  ai-analysis:
    name: 🤖 AI Analysis
    runs-on: ubuntu-latest
    needs: [build, unit-tests, code-quality]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install AI pipeline dependencies
        run: npm ci
        working-directory: ai-pipeline

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: build-output
        continue-on-error: true

      - name: Download test output
        uses: actions/download-artifact@v4
        with:
          name: test-output
        continue-on-error: true

      - name: Download sonar output
        uses: actions/download-artifact@v4
        with:
          name: sonar-output
        continue-on-error: true

      - name: Run AI Analysis & Notify Teams
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BUILD_STATUS: ${{ needs.build.outputs.status }}
          TEST_STATUS: ${{ needs.unit-tests.outputs.status }}
          SONAR_STATUS: ${{ needs.code-quality.outputs.status }}
        run: node ai-pipeline/index.js
