image: node:18

pipelines:
  default:
    - step:
        name: Install, Test & SonarCloud
        caches:
          - node
        script:
          # Install Chrome for Karma tests
          - apt-get update
          - apt-get install -y wget gnupg
          - wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | apt-key add -
          - echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" > /etc/apt/sources.list.d/google-chrome.list
          - apt-get update
          - apt-get install -y google-chrome-stable

          # Install dependencies
          - npm install

          # Run Angular unit tests
          - npm run test -- --watch=false --browsers=ChromeHeadless --code-coverage

          # Build Angular app
          - npm run build

          # Install Sonar Scanner
          - apt-get install -y openjdk-11-jre unzip
          - curl -sSLo sonar-scanner.zip https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip
          - unzip sonar-scanner.zip
          - mv sonar-scanner-5.0.1.3006-linux sonar-scanner
          - export PATH="$PATH:$(pwd)/sonar-scanner/bin"

          # Run SonarCloud analysis
          - sonar-scanner \
              -Dsonar.projectKey=bmecommerce_ecom-angular \
              -Dsonar.organization=bmecommerce \
              -Dsonar.host.url=https://sonarcloud.io \
              -Dsonar.login=$SONAR_TOKEN \
              -Dsonar.javascript.lcov.reportPaths=coverage/visualization/lcov.info
