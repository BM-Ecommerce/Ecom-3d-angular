image: node:18  # Node image for Angular

clone:
  depth: full   # Required by SonarCloud

definitions:
  caches:
    node: ~/.npm
    sonar: ~/.sonar/cache

  steps:
    - step: &build-test-sonarcloud
        name: Build, Test & Analyze (SonarCloud)
        caches:
          - node
          - sonar
        script:
          # 1. Install dependencies
          - npm install

          # 2. Install Chrome for Karma Headless
          - apt-get update && apt-get install -y wget gnupg unzip
          - wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          - apt-get install -y ./google-chrome-stable_current_amd64.deb || apt-get install -f -y

          # 3. Run tests & generate coverage
          - npm run test -- --watch=false --browsers=ChromeHeadless --code-coverage

          # 4. Build Angular
          - npm run build -- --configuration production

          # 5. Run SonarCloud pipe
          - pipe: sonarsource/sonarcloud-scan:4.0.0
            variables:
              EXTRA_ARGS: >
                -Dsonar.projectKey=bmecommerce_ecom-angular
                -Dsonar.organization=bmecommerce
                -Dsonar.sources=src
                -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
                -Dsonar.tests=src
                -Dsonar.test.inclusions="**/*.spec.ts"

    - step: &check-quality-gate-sonarcloud
        name: Check Quality Gate (SonarCloud)
        script:
          - pipe: sonarsource/sonarcloud-quality-gate:0.1.6

pipelines:
  branches:
    master:
      - step: *build-test-sonarcloud
      - step: *check-quality-gate-sonarcloud

  pull-requests:
    '**':
      - step: *build-test-sonarcloud
      - step: *check-quality-gate-sonarcloud

