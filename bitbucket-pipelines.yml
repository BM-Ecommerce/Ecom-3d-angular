image: node:18

clone:
  depth: full   # Required for SonarCloud

definitions:
  caches:
    node: ~/.npm
    sonar: ~/.sonar/cache

  steps:
    - step: &build-test-sonar
        name: Build, Test & SonarCloud
        caches:
          - node
          - sonar
        script:
          # 1. Install dependencies
          - npm ci

          # 2. Install Chrome for Karma Headless
          - apt-get update
          - apt-get install -y wget gnupg
          - wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          - apt-get install -y ./google-chrome-stable_current_amd64.deb || apt-get install -f -y

          # 3. Run Angular tests with custom launcher
          - npm run test -- --watch=false --browsers=ChromeHeadlessCI --code-coverage

          # 4. Build Angular App
          - npm run build -- --configuration production

          # 5. SonarCloud Scan
          - pipe: sonarsource/sonarcloud-scan:4.0.0
            variables:
              EXTRA_ARGS: >
                -Dsonar.projectKey=bmecommerce_ecom-angular
                -Dsonar.organization=bmecommerce
                -Dsonar.sources=src
                -Dsonar.tests=src
                -Dsonar.javascript.lcov.reportPaths=coverage/visualization/lcov.info
                -Dsonar.test.inclusions=**/*.spec.ts

    - step: &quality-gate
        name: SonarCloud Quality Gate
        script:
          - pipe: sonarsource/sonarcloud-quality-gate:0.1.6

pipelines:
  branches:
    main:
      - step: *build-test-sonar
      - step: *quality-gate

  pull-requests:
    '**':
      - step: *build-test-sonar
      - step: *quality-gate
